name: Build insights DB

# Slow path: rebuild the compact player-insights database from the Match Charting data
# and publish it as a Release asset. Charting data changes slowly, so weekly (or manual).
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"        # Mondays 06:17 UTC

permissions:
  contents: write               # publish/refresh the Release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra analysis

      - name: Ingest + derive tables
        run: |
          uv run match-charting-project ingest --no-provenance
          uv run match-charting-project shots
          uv run match-charting-project eras

      - name: Run experiments (per-player CSVs)
        run: |
          uv run python experiments/player_styles/run.py
          uv run python experiments/shot_language/run.py
          uv run python experiments/shot_patterns/run.py
          uv run python experiments/class_relative_wpa/run.py

      - name: Build insights.duckdb
        run: uv run match-charting-project site build-insights

      - name: Publish insights.duckdb as a Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create insights-latest --title "Insights database" \
            --notes "Auto-built player insights" 2>/dev/null || true
          gh release upload insights-latest data/insights.duckdb --clobber
